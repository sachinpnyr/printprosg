<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 70" width="200" height="70">
  <defs>
    <style>
      .logo-name { font-family: 'Arial', sans-serif; font-weight: 800; font-size: 22px; letter-spacing: 2px; fill: #1a1a2e; }
      .logo-tag { font-family: 'Arial', sans-serif; font-weight: 400; font-size: 10px; letter-spacing: 3px; fill: #c9a84c; }
    </style>
  </defs>
  <!-- Background -->
  <rect width="200" height="70" fill="white" rx="0"/>
  <!-- Accent bar -->
  <rect x="0" y="0" width="4" height="70" fill="#c9a84c" rx="2"/>
  <!-- Icon circle -->
  <circle cx="42" cy="35" r="20" fill="#1a1a2e" opacity="0.08"/>
  <!-- Icon -->
  <g transform="translate(30, 23)" stroke="#1a1a2e" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 2L2 9l10 13L22 9z M2 9h20 M7 9L12 2 M17 9L12 2" transform="scale(1)"/>
  </g>
  <!-- Company name -->
  <text x="70" y="32" class="logo-name">PEARL</text>
  <!-- Tagline -->
  <text x="71" y="48" class="logo-tag">EVENTS</text>
  <!-- Accent dot -->
  <circle cx="182" cy="35" r="4" fill="#c9a84c" opacity="0.6"/>
</svg>