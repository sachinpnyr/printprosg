<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 70" width="200" height="70">
  <defs>
    <style>
      .logo-name { font-family: 'Arial', sans-serif; font-weight: 800; font-size: 22px; letter-spacing: 2px; fill: #e65100; }
      .logo-tag { font-family: 'Arial', sans-serif; font-weight: 400; font-size: 10px; letter-spacing: 3px; fill: #ff9800; }
    </style>
  </defs>
  <!-- Background -->
  <rect width="200" height="70" fill="white" rx="0"/>
  <!-- Accent bar -->
  <rect x="0" y="0" width="4" height="70" fill="#ff9800" rx="2"/>
  <!-- Icon circle -->
  <circle cx="42" cy="35" r="20" fill="#e65100" opacity="0.08"/>
  <!-- Icon -->
  <g transform="translate(30, 23)" stroke="#e65100" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 20l9-16 9 16H3z M9 20l3-5 3 5" transform="scale(1)"/>
  </g>
  <!-- Company name -->
  <text x="70" y="32" class="logo-name">APEX</text>
  <!-- Tagline -->
  <text x="71" y="48" class="logo-tag">SOLUTIONS</text>
  <!-- Accent dot -->
  <circle cx="182" cy="35" r="4" fill="#ff9800" opacity="0.6"/>
</svg>