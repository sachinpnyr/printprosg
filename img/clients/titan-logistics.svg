<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 70" width="200" height="70">
  <defs>
    <style>
      .logo-name { font-family: 'Arial', sans-serif; font-weight: 800; font-size: 22px; letter-spacing: 2px; fill: #b71c1c; }
      .logo-tag { font-family: 'Arial', sans-serif; font-weight: 400; font-size: 10px; letter-spacing: 3px; fill: #ff5722; }
    </style>
  </defs>
  <!-- Background -->
  <rect width="200" height="70" fill="white" rx="0"/>
  <!-- Accent bar -->
  <rect x="0" y="0" width="4" height="70" fill="#ff5722" rx="2"/>
  <!-- Icon circle -->
  <circle cx="42" cy="35" r="20" fill="#b71c1c" opacity="0.08"/>
  <!-- Icon -->
  <g transform="translate(30, 23)" stroke="#b71c1c" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M1 3h15v13H1z M16 8h4l3 3v5h-7V8z M5.5 21a1.5 1.5 0 100-3 1.5 1.5 0 000 3z M18.5 21a1.5 1.5 0 100-3 1.5 1.5 0 000 3z" transform="scale(1)"/>
  </g>
  <!-- Company name -->
