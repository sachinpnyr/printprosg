<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 70" width="200" height="70">
  <defs>
    <style>
      .logo-name { font-family: 'Arial', sans-serif; font-weight: 800; font-size: 22px; letter-spacing: 2px; fill: #880e4f; }
      .logo-tag { font-family: 'Arial', sans-serif; font-weight: 400; font-size: 10px; letter-spacing: 3px; fill: #e91e63; }
    </style>
  </defs>
  <!-- Background -->
  <rect width="200" height="70" fill="white" rx="0"/>
  <!-- Accent bar -->
  <rect x="0" y="0" width="4" height="70" fill="#e91e63" rx="2"/>
  <!-- Icon circle -->
  <circle cx="42" cy="35" r="20" fill="#880e4f" opacity="0.08"/>
  <!-- Icon -->
  <g transform="translate(30, 23)" stroke="#880e4f" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z M10 8l6 4-6 4V8z" transform="scale(1)"/>
  </g>
  <!-- Company name -->
  <text x="70" y="32" class="logo-name">NEXUS</text>
  <!-- Tagline -->
  <text x="71" y="48" class="logo-tag">MEDIA</text>
  <!-- Accent dot -->
  <circle cx="182" cy="35" r="4" fill="#e91e63" opacity="0.6"/>
</svg>