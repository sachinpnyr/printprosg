<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 48" width="220" height="48" role="img" aria-label="Print Pro Singapore Logo">
  <defs>
    <!-- Red gradient for icon -->
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:1" />
    </linearGradient>
    <!-- Ink drop glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Clip path for print lines reveal -->
    <clipPath id="lineClip">
      <rect x="0" y="0" width="0" height="48">
        <animate attributeName="width" from="0" to="48" dur="0.8s" begin="0.6s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
      </rect>
    </clipPath>
  </defs>

  <!-- ===== ICON BACKGROUND SQUARE ===== -->
  <rect x="0" y="4" width="40" height="40" rx="8" fill="url(#redGrad)">
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0s" fill="freeze"/>
    <animate attributeName="rx" from="20" to="8" dur="0.5s" begin="0s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </rect>

  <!-- ===== PRINT LINES (horizontal lines like a printed page) ===== -->
  <g clip-path="url(#lineClip)">
    <rect x="8" y="14" width="24" height="3" rx="1.5" fill="white" opacity="0.9"/>
    <rect x="8" y="20" width="18" height="3" rx="1.5" fill="white" opacity="0.7"/>
    <rect x="8" y="26" width="22" height="3" rx="1.5" fill="white" opacity="0.9"/>
    <rect x="8" y="32" width="14" height="3" rx="1.5" fill="white" opacity="0.6"/>
  </g>

  <!-- ===== INK DROP ===== -->
  <g filter="url(#glow)">
    <!-- Drop body -->
    <path d="M20 6 C20 6 26 12 26 17 C26 20.3 23.3 23 20 23 C16.7 23 14 20.3 14 17 C14 12 20 6 20 6Z" fill="white" opacity="0">
      <animate attributeName="opacity" from="0" to="0" dur="0.5s" begin="0s" fill="freeze"/>
      <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="1.5s" fill="freeze"/>
      <animate attributeName="opacity" from="1" to="0" dur="0.5s" begin="2.2s" fill="freeze"/>
    </path>
  </g>

  <!-- ===== "P" LETTER MARK (shown after lines animate) ===== -->
  <text x="11" y="33" font-family="'Georgia', serif" font-size="22" font-weight="900" fill="white" opacity="0">
    P
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.4s" fill="freeze"/>
  </text>

  <!-- ===== BRAND NAME "Print Pro" ===== -->
  <!-- "Print" -->
  <text x="50" y="26" font-family="'Georgia', 'Times New Roman', serif" font-size="17" font-weight="700" fill="white" letter-spacing="0.5" opacity="0">
    Print
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.9s" fill="freeze"/>
    <animate attributeName="x" from="40" to="50" dur="0.5s" begin="0.9s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </text>
  <!-- "Pro" in red accent -->
  <text x="101" y="26" font-family="'Georgia', 'Times New Roman', serif" font-size="17" font-weight="700" fill="#e74c3c" letter-spacing="0.5" opacity="0">
    Pro
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.1s" fill="freeze"/>
    <animate attributeName="x" from="91" to="101" dur="0.5s" begin="1.1s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </text>

  <!-- ===== TAGLINE "Singapore" ===== -->
  <text x="50" y="39" font-family="'Arial', sans-serif" font-size="9.5" font-weight="400" fill="rgba(255,255,255,0.7)" letter-spacing="2.5" opacity="0">
    SINGAPORE
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="1.4s" fill="freeze"/>
  </text>

  <!-- ===== ANIMATED UNDERLINE ===== -->
  <line x1="50" y1="42" x2="50" y2="42" stroke="#e74c3c" stroke-width="1.5" stroke-linecap="round" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="1.4s" fill="freeze"/>
    <animate attributeName="x2" from="50" to="170" dur="0.6s" begin="1.4s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </line>

  <!-- ===== SCROLLED (dark) VERSION — same but with dark text ===== -->
  <!-- These are hidden by default; CSS switches them via .navbar.scrolled -->
</svg>
